version: '3.8'

services:
  # 1. BASE DE DATOS (Persistencia)
  # ¿Qué resuelve? Almacenamiento seguro y relacional de usuarios y lógica.
  postgres:
    image: postgres:16-alpine
    container_name: lab-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: dev_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. CACHÉ (Velocidad)
  # ¿Qué resuelve? Respuestas en microsegundos y gestión de sesiones.
  redis:
    image: redis:7-alpine
    container_name: lab-redis
    restart: always
    ports:
      - "6379:6379"

  # 3. MENSAJERÍA (Asincronismo)
  # ¿Qué resuelve? Que la app no se bloquee procesando tareas pesadas.
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: lab-rabbitmq
    restart: always
    ports:
      - "5672:5672"   # Puerto para que la API envíe mensajes
      - "15672:15672" # Panel de control web (Dashboard)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

# Definimos volúmenes para que los datos no mueran al detener los contenedores
volumes:
  postgres_data:
