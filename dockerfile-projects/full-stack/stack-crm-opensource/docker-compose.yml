version: "3.9"

services:
  # --- BASE DE DATOS ---
  mariadb:
    image: mariadb:11
    container_name: espocrm-db
    restart: always
    env_file: .env
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MYSQL_DATABASE}
      MARIADB_USER: ${MYSQL_USER}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - crm-network
    # Healthcheck real para MariaDB 11
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --- APLICACIÓN CRM ---
  espocrm:
    image: espocrm/espocrm
    container_name: espocrm
    restart: always
    env_file: .env
    # Cambiado: Ahora chequea si el servidor web interno responde
    healthcheck:
      test: ["CMD-SHELL", "php -v || exit 1"] 
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      ESPOCRM_DATABASE_HOST: mariadb
      ESPOCRM_DATABASE_USER: ${MYSQL_USER}
      ESPOCRM_DATABASE_PASSWORD: ${MYSQL_PASSWORD}
      ESPOCRM_SITE_URL: https://${DOMAIN}
    volumes:
      - espocrm_data:/var/www/html
    depends_on:
      mariadb:
        condition: service_healthy # <--- Crucial: Espera a que la DB esté sana
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crm.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.crm.entrypoints=web,websecure"
      - "traefik.http.routers.crm.tls.certresolver=myresolver"
      - "traefik.http.services.crm.loadbalancer.server.port=80"
      - "traefik.docker.network=crm-network"
    networks:
      - crm-network

  # --- PROXY INVERSO (SSL y Tráfico) ---
  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: always
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=crm-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Configuración ACME (Let's Encrypt)
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${EMAIL_LETSENCRYPT}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # Permite a Traefik leer otros contenedores
      - ./traefik/acme.json:/letsencrypt/acme.json # Persistencia de certificados SSL
    networks:
      - crm-network

  # --- MONITOREO (Métricas) ---
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus # Volumen persistente para métricas históricas
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN}`)"
      - "traefik.http.routers.prometheus.entrypoints=web,websecure"
      - "traefik.http.routers.prometheus.tls.certresolver=myresolver"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      - "traefik.docker.network=crm-network"
    networks:
      - crm-network

  # --- VISUALIZACIÓN ---
  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: always
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASS}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`monitor.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=web,websecure"
      - "traefik.http.routers.grafana.tls.certresolver=myresolver"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "traefik.docker.network=crm-network"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - crm-network

# --- RED PRIVADA ---
networks:
  crm-network:
    driver: bridge

# --- VOLÚMENES PERSISTENTES ---
volumes:
  db_data:
  espocrm_data:
  grafana_data:
  prometheus_data: # Añadido para no perder métricas al reiniciar Prometheus