<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexTech Elite | Brazilian Legal Intelligence</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚖️</text></svg>">
    <link rel="icon" href="https://img.icons8.com/ios-filled/50/D4AF37/scales.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pure-black: #050505;
            --card-bg: #0c0c0c;
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --text-gray: #a0a0a0;
            --border: #1a1a1a;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--pure-black);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Estilo Bóveda */
        header {
            padding: 4rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: radial-gradient(circle at 50% -20%, #1a150a 0%, transparent 70%);
        }

        .logo-container {
            margin-bottom: 1.5rem;
        }

        .logo-svg {
            width: 60px;
            height: 60px;
            filter: drop-shadow(0 0 10px var(--gold-glow));
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 2.8rem;
            letter-spacing: 8px;
            margin: 0;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--text-gray);
            font-size: 0.75rem;
            margin-top: 15px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* Nav & Button */
        .nav {
            display: flex;
            justify-content: center;
            padding: 2rem;
        }

        .btn-elite {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 15px 40px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            letter-spacing: 3px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-elite:hover {
            color: #000;
            background: var(--gold);
            box-shadow: 0 0 30px var(--gold-glow);
            transform: translateY(-2px);
        }

        /* Status Label */
        .status {
            text-align: center;
            color: var(--gold);
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            height: 20px;
            opacity: 0.8;
        }

        /* Grid de Leyes */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            padding: 0 3rem 4rem 3rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 2rem;
            position: relative;
            transition: all 0.3s ease;
            border-left: 2px solid var(--gold);
        }

        .card:hover {
            border-color: var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: scale(1.02);
        }

        .card h3 {
            color: #fff;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            margin: 0 0 1rem 0;
            line-height: 1.4;
        }

        .card p {
            color: var(--text-gray);
            font-size: 0.9rem;
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }

        .view-btn {
            display: inline-block;
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 2px;
            border: 1px solid var(--gold);
            padding: 8px 15px;
            transition: 0.3s;
        }

        .view-btn:hover {
            background: var(--gold);
            color: #000;
        }

        /* Animación de carga */
        .loading {
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <svg class="logo-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3V21M12 3L4 7M12 3L20 7M4 7V10C4 12.2091 5.79086 14 8 14C10.2091 14 12 12.2091 12 10V7M20 7V10C20 12.2091 18.2091 14 16 14C13.7909 14 12 12.2091 12 10V7" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>
    <h1>LexTech Elite</h1>
    <div class="subtitle">Brazilian Tech Law Bault</div>
</header>

<div class="nav">
    <button class="btn-elite" id="btn-brazil">Access Brazil Archive</button>
</div>

<div id="status" class="status">AUTHENTICATION READY</div>
<div id="results" class="grid"></div>

<script>
    async function loadLaws(country) {
        const grid = document.getElementById('results');
        const status = document.getElementById('status');
        
        status.innerText = `FETCHING ENCRYPTED DATA: ${country.toUpperCase()}...`;
        status.classList.add('loading');
        grid.innerHTML = '';

        try {
            const response = await fetch(`/api/laws/${country}`);
            const result = await response.json();
            
            status.classList.remove('loading');

            if (result.status === 'success' && result.data.length > 0) {
                status.innerText = `ACCESS GRANTED: ${result.data.length} RECORDS FOUND`;
                result.data.forEach(law => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <h3>${law.titulo}</h3>
                        <p>${law.descripcion}</p>
                        <a href="${law.url}" target="_blank" class="view-btn">DECRYPT DOCUMENT §</a>
                    `;
                    grid.appendChild(div);
                });
            } else {
                status.innerText = 'DATABASE EMPTY OR ACCESS DENIED.';
            }
        } catch (err) {
            console.error(err);
            status.classList.remove('loading');
            status.innerText = 'CONNECTION PROTOCOL FAILURE.';
        }
    }

    // Listener Seguro
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('btn-brazil').addEventListener('click', () => {
            loadLaws('brazil');
        });
    });
</script>
</body>
</html>
