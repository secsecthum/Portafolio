version: "3.9"

services:
  mariadb:
    image: mariadb:11
    container_name: espocrm-db
    restart: always
    env_file: .env
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MYSQL_DATABASE}
      MARIADB_USER: ${MYSQL_USER}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - crm-network

  espocrm:
    image: espocrm/espocrm
    container_name: espocrm
    restart: always
    env_file: .env
    environment:
      ESPOCRM_DATABASE_HOST: mariadb
      ESPOCRM_DATABASE_USER: ${MYSQL_USER}
      ESPOCRM_DATABASE_PASSWORD: ${MYSQL_PASSWORD}
      ESPOCRM_ADMIN_USERNAME: ${ESPO_ADMIN_USER}
      ESPOCRM_ADMIN_PASSWORD: ${ESPO_ADMIN_PASS}
      ESPOCRM_SITE_URL: https://${DOMAIN}
    volumes:
      - espocrm_data:/var/www/html
    depends_on:
      - mariadb
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crm.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.crm.entrypoints=websecure"
      - "traefik.http.routers.crm.tls.certresolver=myresolver"
      # EspoCRM (Apache) corre en el 80
      - "traefik.http.services.crm.loadbalancer.server.port=80"
      # Redirección HTTP a HTTPS
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.crm-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.crm-http.entrypoints=web"
      - "traefik.http.routers.crm-http.middlewares=redirect-to-https"
    networks:
      - crm-network
    # No necesitas exponer el puerto 8080 en la VPS, Traefik lo maneja internamente
    command: >
      sh -c "chown -R 33:33 /var/www/html &&
           find /var/www/html -type d -exec chmod 775 {} + &&
           find /var/www/html -type f -exec chmod 664 {} + &&
           docker-php-entrypoint apache2-foreground"

  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: always
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Configuración de Certificados
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${EMAIL_LETSENCRYPT}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/letsencrypt/acme.json
    networks:
      - crm-network

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN}`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls.certresolver=myresolver"
      # Puerto interno de Prometheus
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
    networks:
      - crm-network

  grafana:
    image: grafana/grafana
    container_name: grafana
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASS}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`monitor.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=myresolver"
      # Puerto interno de Grafana
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - crm-network

  loki:
    image: grafana/loki
    container_name: loki
    restart: always
    volumes:
      - ./loki/loki-config.yml:/etc/loki/config.yml
    command: -config.file=/etc/loki/config.yml
    networks:
      - crm-network

volumes:
  db_data:
  espocrm_data:
  grafana_data:

networks:
  crm-network: