services:
  mariadb:
    image: mariadb:11
    container_name: espocrm-db
    restart: always
    env_file: .env
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MYSQL_DATABASE}
      MARIADB_USER: ${MYSQL_USER}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - crm-network
    healthcheck:
      # Usamos mysqladmin para verificar que el servidor RESPONDE a conexiones
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10         # Más intentos para aguantar el reinicio del entrypoint
      start_period: 60s   # Un minuto de gracia para la inicialización pesada
  espocrm:
    image: espocrm/espocrm
    container_name: espocrm
    restart: always
    env_file: .env
    environment:
      ESPOCRM_DATABASE_HOST: mariadb
      ESPOCRM_DATABASE_USER: ${MYSQL_USER}
      ESPOCRM_DATABASE_PASSWORD: ${MYSQL_PASSWORD}
      ESPOCRM_SITE_URL: https://${DOMAIN}
    volumes:
      - espocrm_data:/var/www/html
    depends_on:
      mariadb:
        condition: service_healthy
    # FIX HEALTHCHECK: Usamos curl porque Espo tiene un servidor web interno
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 160s # Damos tiempo a la instalación inicial
    networks:
      - crm-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crm.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.crm.entrypoints=web,websecure"
      - "traefik.http.routers.crm.tls.certresolver=myresolver"
  
  espocrm-exporter:
    image: lusotycoon/apache-exporter
    container_name: espocrm-exporter
    command:
      - '--scrape_uri=http://espocrm/server-status?auto'
    networks:
      - crm-network
    depends_on:
      - espocrm

  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: always
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${EMAIL_LETSENCRYPT}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/letsencrypt/acme.json
    networks:
      - crm-network

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - crm-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN}`)"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls.certresolver=myresolver"

  loki:
    image: grafana/loki:latest
    container_name: loki
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/tmp/loki
    networks:
      - crm-network

  # NUEVO: Promtail para enviar logs de Docker a Loki
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    # Necesitas crear este archivo simple de configuración
    networks:
      - crm-network

  grafana:
    image: grafana/grafana
    container_name: grafana
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASS}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - crm-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`monitor.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=myresolver"

networks:
  crm-network:
    driver: bridge

volumes:
  db_data:
  espocrm_data:
  grafana_data:
  prometheus_data:
  loki_data: